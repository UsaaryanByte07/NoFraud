<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>

<body>

    <div class="header">
        <img src="icon/icon48.png" alt="NoFraud" class="logo">
        <h1>NoFraud</h1>
        <p class="subtitle">Cybersecurity Shield</p>
    </div>

    <div class="section">
        <div class="card">
            <div class="card-header">
                <span class="card-icon">🛡️</span>
                <span class="card-title">Threat Status</span>
            </div>
            <div class="card-body">
                <span id="threatStatus" class="status-badge scanning">Scanning...</span>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-icon">⚡</span>
                <span class="card-title">Risk Level</span>
            </div>
            <div class="card-body">
                <span id="severity" class="risk-badge analyzing">Analyzing...</span>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-icon">📧</span>
                <span class="card-title">Email Scanner</span>
            </div>
            <div class="card-body">
                <div class="input-group">
                    <input id="emailCheck" type="email" placeholder="Enter email to scan..." />
                    <button id="scanMail">Scan</button>
                </div>
                <p id="mailResult" class="result-text"></p>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-icon">👁️</span>
                <span class="card-title">Musoku Mode</span>
            </div>
            <div class="card-body">
                <p class="card-desc">Activate minimal trace browsing protection.</p>
                <button id="musokuToggle" class="btn-musoku">Activate</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>NoFraud v1.0 — Stay Safe Online</p>
    </div>

    <script src="popup.js"></script>

</body>

</html>
